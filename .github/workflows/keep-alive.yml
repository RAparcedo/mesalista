# Pings the API every 10 minutes so Render's free tier doesn't spin it down
# (cold starts take ~50 s). Hits /api/settings instead of /api/health so the
# ping also reaches the database, keeping Supabase's free tier active too.
# Render free tier includes 750 instance-hours/month — enough for 24/7.
name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: # allows manual runs to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl -fsS --max-time 90 --retry 2 https://mesalista-76s8.onrender.com/api/settings
